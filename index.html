<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fashion Scrolling | Luxury Affiliate Boutique</title>
    <meta name="description" content="Discover premium electronics, fashion, and beauty products with seamless scrolling. Luxury affiliate selections at your fingertips.">
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">S</div>
                FS<span>Fashion Scrolling</span>
            </a>
            <div class="header-actions">
                <button id="admin-link" class="share-btn" title="Admin">
                    <i data-lucide="user"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="feed-container">
            <!-- Masonry Grid -->
            <div id="product-feed" class="masonry-grid">
                <!-- Product cards will be injected here by app.js -->
                
                <!-- Loading Skeletons (Initial State) -->
                <div class="product-card skeleton" style="height: 300px;"></div>
                <div class="product-card skeleton" style="height: 400px;"></div>
                <div class="product-card skeleton" style="height: 350px;"></div>
                <div class="product-card skeleton" style="height: 450px;"></div>
            </div>
        </section>
    </main>

    <!-- App Scripts -->
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Redirect to admin for demo
        document.getElementById('admin-link').addEventListener('click', () => {
            window.location.href = 'admin.html';
        });
    </script>
</body>
</html>
