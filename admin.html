<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FS Admin | Command Center</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }
        .nav-item {
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 600;
            transition: var(--transition-smooth);
        }
        .nav-item.active {
            color: var(--primary-color);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, min-minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--surface-accent);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        th {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .action-btns {
            display: flex;
            gap: 10px;
        }
        .btn-small {
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: 4px;
        }
        .btn-delete { background: #ff4d4d; color: white; border: none; }
        .btn-edit { background: #4d79ff; color: white; border: none; }
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <!-- Login Screen Overlay -->
    <div id="login-screen">
        <div class="admin-card" style="width: 350px;">
            <div class="logo" style="justify-content: center; margin-bottom: 30px;">
                <div class="logo-icon">S</div>
                FS<span>Admin</span>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-input" id="username" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="cta-button">Secure Login</button>
            </form>
        </div>
    </div>

    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">S</div>
                FS<span>Command Center</span>
            </a>
            <button class="share-btn" onclick="logout()">
                <i data-lucide="log-out"></i>
            </button>
        </div>
    </header>

    <main class="container admin-container">
        <div class="admin-nav">
            <span class="nav-item active" onclick="showTab(this, 'inventory')">Inventory</span>
            <span class="nav-item" onclick="showTab(this, 'add-product')">Add New</span>
            <span class="nav-item" onclick="showTab(this, 'analytics')">Monthly Report</span>
        </div>

        <!-- Inventory Tab -->
        <div id="tab-inventory" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-products">0</div>
                    <div class="stat-label">Active Products</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-clicks">0</div>
                    <div class="stat-label">Total Clicks</div>
                </div>
            </div>

            <div class="admin-card">
                <h3>Live Inventory</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Price (₹)</th>
                            <th>Price ($)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-list">
                        <!-- Items injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Product Tab -->
        <div id="tab-add-product" class="tab-content" style="display: none;">
            <div class="admin-card">
                <h3>Manual Product Entry</h3>
                <form id="product-form">
                    <div class="form-group">
                        <label>Product Title</label>
                        <input type="text" class="form-input" id="p-title" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select class="form-select" id="p-category">
                            <option>Electronics</option>
                            <option>Shoes</option>
                            <option>Jewelry</option>
                            <option>Ladies' Fashion</option>
                            <option>Gents' Fashion</option>
                            <option>Beauty Products</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Price (INR)</label>
                            <input type="number" class="form-input" id="p-inr" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Price (USD)</label>
                            <input type="number" class="form-input" id="p-usd" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Affiliate URL</label>
                        <input type="url" class="form-input" id="p-link" required>
                    </div>
                    <div class="form-group">
                        <label>Image Upload (Simulation)</label>
                        <div id="upload-box" style="border: 2px dashed var(--glass-border); padding: 30px; text-align: center; border-radius: 8px; cursor: pointer;">
                            <i data-lucide="upload-cloud" style="margin-bottom: 10px;"></i>
                            <p style="font-size: 0.8rem; color: var(--text-secondary);">Drag & Drop or Click to Upload</p>
                            <input type="file" id="p-image-file" style="display: none;" accept="image/*">
                            <p id="file-display" style="margin-top: 10px; font-size: 0.8rem; color: var(--primary-color);"></p>
                        </div>
                    </div>
                    <input type="hidden" id="p-id">
                    <button type="submit" class="cta-button" id="submit-btn">Publish Product</button>
                    <button type="button" class="cta-button" id="cancel-btn" style="display: none; background: #666; margin-top: 10px;">Cancel Edit</button>
                </form>
            </div>
        </div>

        <!-- Analytics Tab -->
        <div id="tab-analytics" class="tab-content" style="display: none;">
            <div class="admin-card">
                <h3>Monthly Performance Report</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Product Name</th>
                            <th>Clicks</th>
                            <th>Device Trend</th>
                        </tr>
                    </thead>
                    <tbody id="analytics-list">
                        <!-- Analytics data injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/store.js"></script>
    <script>
        lucide.createIcons();

        // Simple Auth Logic
        const loginForm = document.getElementById('login-form');
        const loginScreen = document.getElementById('login-screen');

        if (sessionStorage.getItem('fs_auth')) {
            loginScreen.style.display = 'none';
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user === 'admin' && pass === 'password') {
                sessionStorage.setItem('fs_auth', 'true');
                loginScreen.classList.add('fade-out');
                setTimeout(() => loginScreen.style.display = 'none', 500);
            } else {
                alert('Invalid credentials. Hint: admin/password');
            }
        });

        function logout() {
            sessionStorage.removeItem('fs_auth');
            location.reload();
        }
        window.logout = logout;

        // Tab Logic
        function showTab(element, tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(`tab-${tab}`).style.display = 'block';
            if (element) {
                element.classList.add('active');
            } else {
                // Fallback for programmatic calls
                document.querySelector(`[onclick*="'${tab}'"]`).classList.add('active');
            }
            
            if (tab === 'inventory') renderInventory();
            if (tab === 'analytics') renderAnalytics();
        }
        window.showTab = showTab;

        // Inventory Logic
        function renderInventory() {
            const products = getProducts();
            const list = document.getElementById('inventory-list');
            const totalProducts = document.getElementById('total-products');
            const totalClicks = document.getElementById('total-clicks');
            
            totalProducts.textContent = products.length;
            
            const clicks = JSON.parse(localStorage.getItem('fs_clicks') || '[]');
            totalClicks.textContent = clicks.length;

            list.innerHTML = '';
            products.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${p.name}</td>
                    <td>${p.category}</td>
                    <td>₹${p.priceINR.toLocaleString()}</td>
                    <td>$${p.priceUSD}</td>
                    <td class="action-btns">
                        <button class="btn-small btn-edit" data-id="${p.id}">Edit</button>
                        <button class="btn-small btn-delete" data-id="${p.id}">Delete</button>
                    </td>
                `;
                
                // Attach listeners directly to the buttons
                tr.querySelector('.btn-edit').addEventListener('click', () => editProduct(p.id));
                tr.querySelector('.btn-delete').addEventListener('click', () => deleteProduct(p.id));
                
                list.appendChild(tr);
            });
        }

        // Image Upload Interaction
        const uploadBox = document.getElementById('upload-box');
        const fileInput = document.getElementById('p-image-file');
        const fileDisplay = document.getElementById('file-display');

        uploadBox.addEventListener('click', () => fileInput.click());
        
        let selectedImageBase64 = null;

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                fileDisplay.textContent = `Selected: ${file.name}`;
                
                // Convert to Base64 for local storage simulation
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedImageBase64 = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                const products = getProducts().filter(p => String(p.id) !== String(id));
                saveProducts(products);
                renderInventory();
            }
        }
        window.deleteProduct = deleteProduct;

        // Edit Logic
        function editProduct(id) {
            const products = getProducts();
            const product = products.find(p => String(p.id) === String(id));
            
            if (!product) return;

            // Populate Form
            document.getElementById('p-id').value = product.id;
            document.getElementById('p-title').value = product.name;
            document.getElementById('p-category').value = product.category;
            document.getElementById('p-inr').value = product.priceINR;
            document.getElementById('p-usd').value = product.priceUSD;
            document.getElementById('p-link').value = product.affiliateLink;
            
            // Switch to Add/Edit Tab
            showTab(document.querySelector(`[onclick*="'add-product'"]`), 'add-product');
            
            // Change Button Text
            document.getElementById('submit-btn').textContent = 'Update Product';
            document.getElementById('cancel-btn').style.display = 'block';
            document.querySelector('#tab-add-product h3').textContent = 'Edit Product';
        }
        window.editProduct = editProduct;

        document.getElementById('cancel-btn').addEventListener('click', () => {
            resetForm();
            showTab(document.querySelector(`[onclick*="'inventory'"]`), 'inventory');
        });

        function resetForm() {
            productForm.reset();
            selectedImageBase64 = null;
            document.getElementById('p-id').value = '';
            document.getElementById('submit-btn').textContent = 'Publish Product';
            document.getElementById('cancel-btn').style.display = 'none';
            document.querySelector('#tab-add-product h3').textContent = 'Manual Product Entry';
            fileDisplay.textContent = '';
        }

        // Product Add Logic
        const productForm = document.getElementById('product-form');
        productForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const products = getProducts();
            const pId = document.getElementById('p-id').value;
            const existingProduct = products.find(p => String(p.id) === String(pId));

            const productData = {
                id: pId ? (existingProduct ? existingProduct.id : Date.now()) : Date.now(),
                name: document.getElementById('p-title').value,
                category: document.getElementById('p-category').value,
                priceINR: parseInt(document.getElementById('p-inr').value),
                priceUSD: parseInt(document.getElementById('p-usd').value),
                affiliateLink: document.getElementById('p-link').value,
                image: selectedImageBase64 || (existingProduct ? existingProduct.image : "https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=800"),
                description: pId ? "Product updated via admin." : "New product added via admin."
            };
            
            if (pId && existingProduct) {
                // Update Existing
                const index = products.findIndex(p => String(p.id) === String(pId));
                products[index] = productData;
                alert('Product updated successfully!');
            } else {
                // Add New
                products.unshift(productData);
                alert('Product published successfully!');
            }
            
            saveProducts(products);
            resetForm();
            showTab(null, 'inventory');
        });

        // Analytics Logic
        function renderAnalytics() {
            const clicks = JSON.parse(localStorage.getItem('fs_clicks') || '[]');
            const list = document.getElementById('analytics-list');
            const products = getProducts();
            
            list.innerHTML = '';
            
            // Group clicks by product
            const performance = {};
            clicks.forEach(c => {
                performance[c.productId] = (performance[c.productId] || 0) + 1;
            });

            Object.entries(performance).forEach(([pid, count]) => {
                const p = products.find(prod => prod.id == pid);
                if (!p) return;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>May 2026</td>
                    <td>${p.name}</td>
                    <td>${count}</td>
                    <td><i data-lucide="trending-up" style="color: #4caf50; width: 16px;"></i> High</td>
                `;
                list.appendChild(tr);
            });
            
            lucide.createIcons();
        }

        renderInventory();
    </script>
</body>
</html>
